<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TurismoFácil - Mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }

    #container {
      display: flex;
      height: 100vh;
    }

    #map {
      width: 60%;
    }

    #lista {
      width: 40%;
      overflow-y: scroll;
      background: #f5f5f5;
      padding: 10px;
    }

    .card {
      background: white;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      cursor: pointer;
    }

    .card.active {
      border: 2px solid #007bff;
    }

    .topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
      font-weight: bold;
    }

    /* MOBILE */
    @media (max-width: 768px) {
      #container {
        flex-direction: column;
      }

      #map {
        width: 100%;
        height: 50%;
      }

      #lista {
        width: 100%;
        height: 50%;
      }
    }
  </style>
</head>

<body>

<div class="topbar">🌲 TurismoFácil | Huilo Huilo</div>

<div id="container">
  <div id="map"></div>
  <div id="lista"></div>
</div>

<script>
  var map = L.map('map').setView([-39.87, -71.98], 13);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  var lugares = [
    {
      nombre: "Salto Huilo Huilo",
      coords: [-39.874, -71.983],
      descripcion: "Cascada icónica ⭐ Vale totalmente la pena"
    },
    {
      nombre: "Salto del Puma",
      coords: [-39.872, -71.978],
      descripcion: "Gran caída de agua 💧 Mejor en la mañana"
    },
    {
      nombre: "Bosque de los Ciervos",
      coords: [-39.876, -71.975],
      descripcion: "Ideal con niños 🦌 Evitar horas peak"
    },
    {
      nombre: "Museo de los Volcanes",
      coords: [-39.873, -71.982],
      descripcion: "Arquitectura única 🌋"
    },
    {
      nombre: "Puerto Fuy",
      coords: [-39.886, -71.969],
      descripcion: "Vista al lago espectacular 🌅"
    }
  ];

  var lista = document.getElementById("lista");
  var cards = [];
  var markers = [];

  lugares.forEach((lugar, index) => {

    // Crear marcador
    var marker = L.marker(lugar.coords).addTo(map)
      .bindPopup(`<b>${lugar.nombre}</b><br>${lugar.descripcion}`);

    markers.push(marker);

    // Crear tarjeta
    var card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <h3>${lugar.nombre}</h3>
      <p>${lugar.descripcion}</p>
    `;

    // Click en tarjeta → mueve mapa
    card.onclick = () => {
      map.setView(lugar.coords, 15);
      marker.openPopup();

      cards.forEach(c => c.classList.remove("active"));
      card.classList.add("active");
    };

    // Click en marcador → resalta tarjeta
    marker.on("click", () => {
      cards.forEach(c => c.classList.remove("active"));
      card.classList.add("active");

      card.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    lista.appendChild(card);
    cards.push(card);
  });

</script>

</body>
</html>
