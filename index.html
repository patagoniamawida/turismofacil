<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>TurismoFácil - Mapa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    #map { height: 100vh; }
    .topbar {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: white;
      padding: 10px 15px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="topbar">🌲 TurismoFácil | Huilo Huilo</div>
<div id="map"></div>

<script>
  // Inicializar mapa
  var map = L.map('map').setView([-39.87, -71.98], 13);

  // Capa base (OpenStreetMap)
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // Datos de lugares (MVP)
  var lugares = [
    {
      nombre: "Salto Huilo Huilo",
      coords: [-39.874, -71.983],
      descripcion: "Una de las cascadas más icónicas de la reserva.",
      tipo: "cascada"
    },
    {
      nombre: "Salto del Puma",
      coords: [-39.872, -71.978],
      descripcion: "Impresionante caída de agua con sendero cercano.",
      tipo: "cascada"
    },
    {
      nombre: "Bosque de los Ciervos",
      coords: [-39.876, -71.975],
      descripcion: "Reserva con ciervos en entorno natural.",
      tipo: "naturaleza"
    },
    {
      nombre: "Museo de los Volcanes",
      coords: [-39.873, -71.982],
      descripcion: "Museo temático con arquitectura única.",
      tipo: "cultura"
    },
    {
      nombre: "Puerto Fuy",
      coords: [-39.886, -71.969],
      descripcion: "Acceso al lago Pirehueico y vistas increíbles.",
      tipo: "paisaje"
    }
  ];

  // Agregar marcadores
  lugares.forEach(function(lugar) {
    var marker = L.marker(lugar.coords).addTo(map);

    marker.bindPopup(`
      <b>${lugar.nombre}</b><br>
      ${lugar.descripcion}<br><br>
      <button onclick="alert('Aquí iría la ficha completa')">
        Ver más
      </button>
    `);
  });

</script>

</body>
</html>
